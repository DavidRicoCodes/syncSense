schema_version: 1.0.0
profile_id: nosync_passive_hardware_smoke
profile_version: 1.0.0
experiment_type: nosync_passive_hardware_smoke
description: Combined passive 5G SSB and finite WiFi beacon hardware smoke with independent acquisition clocks.
parameters:
  label: {type: string, required: true}
  num_beacons: {type: integer, required: true, minimum: 1, maximum: 600}
  detector_threshold: {type: number, required: false, default: 0.85, minimum: 0, maximum: 1}
  rx_quiet_s: {type: number, required: false, default: 2, minimum: 0.1, maximum: 30}
  rx_max_drain_s: {type: number, required: false, default: 10, minimum: 1, maximum: 60}
  min_valid_ssb_rate_hz: {type: number, required: false, default: 10, minimum: 0.1, maximum: 100}
  scene: {type: string, required: false, default: static}
clock_domains:
  - clock_domain_id: pc3pc4_5g_b210_acquisition
    owner_node_id: pc3pc4
    kind: acquisition
    epoch: local_device_epoch
    comparability_group: pc3pc4_5g_b210_only
  - clock_domain_id: pc3pc4_wifi_b210_acquisition
    owner_node_id: pc3pc4
    kind: acquisition
    epoch: local_device_epoch
    comparability_group: pc3pc4_wifi_b210_only
clock_relationships:
  - left: pc3pc4_5g_b210_acquisition
    right: pc3pc4_wifi_b210_acquisition
    relation: not_comparable
    reason: separate_b210_devices_without_common_acquisition_timebase
processes:
  - producer_id: rx_5g
    node_id: pc3pc4
    role: receiver
    modality: 5g
    command_ref: ssb_online_rx
    lifecycle: continuous
    stop_signal: interrupt
    clock_domain_id: pc3pc4_5g_b210_acquisition
    readiness: {type: stdout_regex, pattern: "^=== Online loop ===$"}
    timeouts: {readiness_s: 60, stop_grace_s: 10, kill_s: 2}
    expected_artifacts:
      - {artifact_id: rx_5g_grids, artifact_type: 5g_ssb_rxgrid_rows, media_type: application/x-ndjson, path: rxgridssb.jsonl, required: true}
      - {artifact_id: rx_5g_log, artifact_type: process_log, media_type: text/plain, path: process.log, required: true}
      - {artifact_id: rx_5g_receipt, artifact_type: producer_result, media_type: application/json, path: producer-result.json, required: true}
  - producer_id: rx_wifi
    node_id: pc3pc4
    role: receiver
    modality: wifi
    command_ref: wifi_online_rx
    lifecycle: continuous
    clock_domain_id: pc3pc4_wifi_b210_acquisition
    readiness: {type: stdout_regex, pattern: "STATUS \\| rate=(?:19(?:\\.[0-9]+)?|[2-9][0-9](?:\\.[0-9]+)?) Msps"}
    timeouts: {readiness_s: 30, stop_grace_s: 8, kill_s: 2}
    expected_artifacts:
      - {artifact_id: rx_wifi_features, artifact_type: wifi_csi_feature_rows, media_type: application/x-ndjson, path: features.jsonl, required: true}
      - {artifact_id: rx_wifi_csi, artifact_type: wifi_csi_cf32, media_type: application/octet-stream, path: csi.cf32, required: true}
      - {artifact_id: rx_wifi_frame_timings, artifact_type: wifi_frame_timing_rows, media_type: application/x-ndjson, path: frame-timings.jsonl, required: true}
      - {artifact_id: rx_wifi_block_timings, artifact_type: wifi_block_timing_rows, media_type: application/x-ndjson, path: block-timings.jsonl, required: true}
      - {artifact_id: rx_wifi_log, artifact_type: process_log, media_type: text/plain, path: process.log, required: true}
      - {artifact_id: rx_wifi_receipt, artifact_type: producer_result, media_type: application/json, path: producer-result.json, required: true}
  - producer_id: tx_wifi
    node_id: pc2
    role: transmitter
    modality: wifi
    command_ref: wifi_finite_tx
    lifecycle: finite
    readiness: {type: process_running, grace_s: 0}
    timeouts: {readiness_s: 15, stop_grace_s: 5, kill_s: 2}
    expected_artifacts:
      - {artifact_id: tx_wifi_log, artifact_type: process_log, media_type: text/plain, path: process.log, required: true}
      - {artifact_id: tx_wifi_receipt, artifact_type: producer_result, media_type: application/json, path: producer-result.json, required: true}
orchestration:
  start_groups:
    - [rx_5g, rx_wifi]
    - [tx_wifi]
  stop_groups:
    - [tx_wifi]
    - [rx_5g, rx_wifi]
  monitor_interval_s: 0.25
  heartbeat_interval_s: 1.0
  supervisor_stale_s: 5.0
  completion:
    finite_producer_id: tx_wifi
    quiet_artifact: rx_wifi/features.jsonl
    quiet_s_parameter: rx_quiet_s
    max_drain_s_parameter: rx_max_drain_s
