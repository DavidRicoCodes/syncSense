schema_version: 1.0.0
profile_id: nosync_passive
profile_version: 1.0.0
experiment_type: nosync_passive
description: Passive 5G SSB and WiFi beacon acquisition without a shared acquisition clock.
parameters:
  label:
    type: string
    required: true
  duration_s:
    type: number
    required: true
    minimum: 0.1
    maximum: 86400
  scene:
    type: string
    required: false
    default: static
clock_domains:
  - clock_domain_id: pc3_5g_acquisition
    owner_node_id: pc3
    kind: acquisition
    epoch: local_device_epoch
    comparability_group: pc3_5g_only
  - clock_domain_id: pc4_wifi_acquisition
    owner_node_id: pc4
    kind: acquisition
    epoch: local_device_epoch
    comparability_group: pc4_wifi_only
clock_relationships:
  - left: pc3_5g_acquisition
    right: pc4_wifi_acquisition
    relation: not_comparable
    reason: no_common_acquisition_timebase
processes:
  - producer_id: rx_5g
    node_id: pc3
    role: receiver
    modality: 5g
    command_ref: simulate_rx_5g
    clock_domain_id: pc3_5g_acquisition
    readiness:
      type: json_file
      path: runtime/status.json
      json_pointer: /status
      equals: ready
    timeouts:
      readiness_s: 15
      stop_grace_s: 5
      kill_s: 2
    expected_artifacts:
      - artifact_id: rx_5g_features
        artifact_type: feature_5g
        media_type: application/octet-stream
        path: features.bin
        required: true
      - artifact_id: rx_5g_events
        artifact_type: temporal_event_index
        media_type: application/x-ndjson
        path: events.jsonl
        required: true
        event_index: true
      - artifact_id: rx_5g_metrics
        artifact_type: metrics
        media_type: application/json
        path: metrics.json
        required: true
  - producer_id: rx_wifi
    node_id: pc4
    role: receiver
    modality: wifi
    command_ref: simulate_rx_wifi
    clock_domain_id: pc4_wifi_acquisition
    readiness:
      type: json_file
      path: runtime/status.json
      json_pointer: /status
      equals: ready
    timeouts:
      readiness_s: 15
      stop_grace_s: 5
      kill_s: 2
    expected_artifacts:
      - artifact_id: rx_wifi_features
        artifact_type: feature_wifi_csi
        media_type: application/octet-stream
        path: features.bin
        required: true
      - artifact_id: rx_wifi_events
        artifact_type: temporal_event_index
        media_type: application/x-ndjson
        path: events.jsonl
        required: true
        event_index: true
      - artifact_id: rx_wifi_metrics
        artifact_type: metrics
        media_type: application/json
        path: metrics.json
        required: true
  - producer_id: tx_wifi
    node_id: pc2
    role: transmitter
    modality: wifi
    command_ref: simulate_tx_wifi
    readiness:
      type: json_file
      path: runtime/status.json
      json_pointer: /status
      equals: ready
    timeouts:
      readiness_s: 15
      stop_grace_s: 5
      kill_s: 2
    expected_artifacts:
      - artifact_id: tx_wifi_metrics
        artifact_type: metrics
        media_type: application/json
        path: metrics.json
        required: true
orchestration:
  start_groups:
    - [rx_5g, rx_wifi]
    - [tx_wifi]
  stop_groups:
    - [tx_wifi]
    - [rx_wifi, rx_5g]
  monitor_interval_s: 0.25
  heartbeat_interval_s: 1.0
  supervisor_stale_s: 5.0

